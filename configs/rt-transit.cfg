set /network-instance default admin-state enable
set /network-instance default ip-forwarding receive-ipv6-check true

set /interface ethernet-1/1 admin-state enable
set /interface ethernet-1/1 subinterface 0 admin-state enable
set /interface ethernet-1/1 subinterface 0 ipv6 admin-state enable
set /interface ethernet-1/1 subinterface 0 ipv6 address 2001:db8:3::2/64
set /network-instance default interface ethernet-1/1.0

set /interface ethernet-1/2 admin-state enable
set /interface ethernet-1/2 subinterface 0 admin-state enable
set /interface ethernet-1/2 subinterface 0 ipv6 admin-state enable
set /interface ethernet-1/2 subinterface 0 ipv6 address 2001:db8:4::2/64
set /network-instance default interface ethernet-1/2.0

set /interface ethernet-1/3 admin-state enable
set /interface ethernet-1/3 subinterface 0 admin-state enable
set /interface ethernet-1/3 subinterface 0 ipv6 admin-state enable
set /interface ethernet-1/3 subinterface 0 ipv6 address 2001:db8:5::1/64
set /network-instance default interface ethernet-1/3.0

set /interface ethernet-1/4 admin-state enable
set /interface ethernet-1/4 subinterface 0 admin-state enable
set /interface ethernet-1/4 subinterface 0 ipv6 admin-state enable
set /interface ethernet-1/4 subinterface 0 ipv6 address 2001:db8:6::1/64
set /network-instance default interface ethernet-1/4.0

set /interface system0 admin-state enable
set /interface system0 subinterface 0 admin-state enable
set /interface system0 subinterface 0 ipv6 admin-state enable
set /interface system0 subinterface 0 ipv6 address 2001:db8:6510::1/128
set /network-instance default interface system0.0

set /network-instance default protocols bgp admin-state enable
set /network-instance default protocols bgp autonomous-system 65100
set /network-instance default protocols bgp router-id 10.4.0.1
set /network-instance default protocols bgp afi-safi ipv6-unicast admin-state enable

set /network-instance default protocols bgp group providers admin-state enable
set /network-instance default protocols bgp group providers afi-safi ipv6-unicast admin-state enable
set /network-instance default protocols bgp group providers description "Upstream Providers"

set /network-instance default protocols bgp group services admin-state enable
set /network-instance default protocols bgp group services afi-safi ipv6-unicast admin-state enable
set /network-instance default protocols bgp group services description "Service Networks"

set /network-instance default protocols bgp neighbor 2001:db8:3::1 peer-as 65002
set /network-instance default protocols bgp neighbor 2001:db8:3::1 peer-group providers
set /network-instance default protocols bgp neighbor 2001:db8:3::1 admin-state enable

set /network-instance default protocols bgp neighbor 2001:db8:4::1 peer-as 65003
set /network-instance default protocols bgp neighbor 2001:db8:4::1 peer-group providers
set /network-instance default protocols bgp neighbor 2001:db8:4::1 admin-state enable

set /network-instance default protocols bgp neighbor 2001:db8:5::2 peer-as 65150
set /network-instance default protocols bgp neighbor 2001:db8:5::2 peer-group services
set /network-instance default protocols bgp neighbor 2001:db8:5::2 admin-state enable

set /network-instance default protocols bgp neighbor 2001:db8:6::2 peer-as 65160
set /network-instance default protocols bgp neighbor 2001:db8:6::2 peer-group services
set /network-instance default protocols bgp neighbor 2001:db8:6::2 admin-state enable

set /routing-policy community-set ISP member [65000:100]
set /routing-policy community-set PROVIDER1 member [65002:100]
set /routing-policy community-set PROVIDER2 member [65003:100]
set /routing-policy community-set GOOGLE member [65150:100]
set /routing-policy community-set CLOUDFLARE member [65160:100]

set /routing-policy prefix-set ISP-INFRA prefix 2001:db8:6500::1/128 mask-length-range exact
set /routing-policy prefix-set ISP-LAN prefix 2001:db8:100::/64 mask-length-range exact
set /routing-policy prefix-set PROVIDER1-INFRA prefix 2001:db8:6502::1/128 mask-length-range exact
set /routing-policy prefix-set PROVIDER2-INFRA prefix 2001:db8:6503::1/128 mask-length-range exact

set /routing-policy prefix-set GOOGLE-INFRA prefix 2001:db8:6515::1/128 mask-length-range exact
set /routing-policy prefix-set GOOGLE prefix 2001:db8:700::/64 mask-length-range exact
set /routing-policy prefix-set CLOUDFLARE prefix 2001:db8:800::/64 mask-length-range exact

set /routing-policy policy IMPORT-PROVIDERS statement 10 match prefix-set PROVIDER1-INFRA
set /routing-policy policy IMPORT-PROVIDERS statement 10 action policy-result accept

set /routing-policy policy IMPORT-PROVIDERS statement 20 match prefix-set PROVIDER2-INFRA
set /routing-policy policy IMPORT-PROVIDERS statement 20 action policy-result accept

set /routing-policy policy IMPORT-PROVIDERS default-action policy-result reject

set /routing-policy policy IMPORT-SERVICES statement 10 match prefix-set GOOGLE
set /routing-policy policy IMPORT-SERVICES statement 10 action policy-result accept

set /routing-policy policy IMPORT-SERVICES statement 20 match prefix-set CLOUDFLARE
set /routing-policy policy IMPORT-SERVICES statement 20 action policy-result accept

set /routing-policy policy IMPORT-SERVICES default-action policy-result reject

set /routing-policy policy EXPORT-PROVIDERS statement 5 match prefix-set GOOGLE-INFRA
set /routing-policy policy EXPORT-PROVIDERS statement 5 action policy-result accept
set /routing-policy policy EXPORT-PROVIDERS statement 10 match prefix-set GOOGLE
set /routing-policy policy EXPORT-PROVIDERS statement 10 action policy-result accept

set /routing-policy policy EXPORT-PROVIDERS statement 20 match prefix-set CLOUDFLARE
set /routing-policy policy EXPORT-PROVIDERS statement 20 action policy-result accept

set /routing-policy policy EXPORT-PROVIDERS default-action policy-result reject

set /routing-policy policy IMPORT-SERVICES statement 5 match prefix-set GOOGLE-INFRA
set /routing-policy policy IMPORT-SERVICES statement 5 action policy-result accept
set /routing-policy policy EXPORT-SERVICES statement 10 match prefix-set PROVIDER1-INFRA
set /routing-policy policy EXPORT-SERVICES statement 10 action policy-result accept

set /routing-policy policy EXPORT-SERVICES statement 20 match prefix-set PROVIDER2-INFRA
set /routing-policy policy EXPORT-SERVICES statement 20 action policy-result accept
set /routing-policy policy EXPORT-SERVICES statement 30 match prefix-set ISP-LAN
set /routing-policy policy EXPORT-SERVICES statement 30 action policy-result accept

set /routing-policy policy EXPORT-SERVICES default-action policy-result reject

set /network-instance default protocols bgp group providers import-policy [ IMPORT-PROVIDERS ]
set /network-instance default protocols bgp group providers export-policy [ EXPORT-PROVIDERS ]

set /network-instance default protocols bgp group services import-policy [ IMPORT-SERVICES ]
set /network-instance default protocols bgp group services export-policy [ EXPORT-SERVICES ]


