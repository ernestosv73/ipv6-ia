set / network-instance default admin-state enable ip-forwarding receive-ipv6-check true
set / interface ethernet-1/1 admin-state enable subinterface 0 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv6 admin-state enable address 2001:db8:1::2/64
set / network-instance default interface ethernet-1/1.0
set / network-instance default protocols bgp autonomous-system 65002
set / network-instance default protocols bgp router-id 10.2.0.1
set / network-instance default protocols bgp afi-safi ipv6-unicast admin-state enable
set / network-instance default protocols bgp group backbone-core admin-state enable
set / network-instance default protocols bgp group backbone-core afi-safi ipv6-unicast admin-state enable
set / network-instance default protocols bgp neighbor 2001:db8:1::1 peer-as 65000
