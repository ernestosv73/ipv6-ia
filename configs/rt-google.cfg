set /network-instance default admin-state enable
set /network-instance default ip-forwarding receive-ipv6-check true

set /interface ethernet-1/1 admin-state enable
set /interface ethernet-1/1 subinterface 0 admin-state enable
set /interface ethernet-1/1 subinterface 0 ipv6 admin-state enable
set /interface ethernet-1/1 subinterface 0 ipv6 address 2001:db8:5::2/64
set /network-instance default interface ethernet-1/1.0

set /interface ethernet-1/2 admin-state enable
set /interface ethernet-1/2 subinterface 0 admin-state enable
set /interface ethernet-1/2 subinterface 0 ipv6 admin-state enable
set /interface ethernet-1/2 subinterface 0 ipv6 address 2001:db8:700::1/64
set /network-instance default interface ethernet-1/2.0

set /interface system0 admin-state enable
set /interface system0 subinterface 0 admin-state enable
set /interface system0 subinterface 0 ipv6 admin-state enable
set /interface system0 subinterface 0 ipv6 address 2001:db8:6515::1/128
set /network-instance default interface system0.0

set /network-instance default protocols bgp admin-state enable
set /network-instance default protocols bgp autonomous-system 65150
set /network-instance default protocols bgp router-id 10.5.0.1
set /network-instance default protocols bgp afi-safi ipv6-unicast admin-state enable

set /network-instance default protocols bgp group transit admin-state enable
set /network-instance default protocols bgp group transit description "Transit AS65100"
set /network-instance default protocols bgp group transit afi-safi ipv6-unicast admin-state enable

set /network-instance default protocols bgp neighbor 2001:db8:5::1 admin-state enable
set /network-instance default protocols bgp neighbor 2001:db8:5::1 peer-as 65100
set /network-instance default protocols bgp neighbor 2001:db8:5::1 peer-group transit

set /routing-policy prefix-set GOOGLE-INFRA prefix 2001:db8:6515::1/128 mask-length-range exact

set /routing-policy prefix-set GOOGLE-DNS prefix 2001:db8:700::/64 mask-length-range exact

set /routing-policy community-set GOOGLE member [65150:100]

set /routing-policy policy EXPORT-GOOGLE statement 10 match prefix-set GOOGLE-INFRA
set /routing-policy policy EXPORT-GOOGLE statement 10 match protocol local
set /routing-policy policy EXPORT-GOOGLE statement 10 action policy-result accept
set /routing-policy policy EXPORT-GOOGLE statement 10 action bgp communities add GOOGLE

set /routing-policy policy EXPORT-GOOGLE statement 20 match prefix-set GOOGLE-DNS
set /routing-policy policy EXPORT-GOOGLE statement 20 match protocol local
set /routing-policy policy EXPORT-GOOGLE statement 20 action policy-result accept

set /routing-policy policy EXPORT-GOOGLE default-action policy-result reject

set /network-instance default protocols bgp group transit export-policy [ EXPORT-GOOGLE ]

set /network-instance default protocols linux import-routes true
set /network-instance default protocols linux export-routes true
set /network-instance default protocols linux export-neighbors true

