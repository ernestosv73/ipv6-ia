set /network-instance default admin-state enable
set /network-instance default ip-forwarding receive-ipv6-check true

set /interface ethernet-1/1 description "eBGP -> Provider1 AS65002"
set /interface ethernet-1/1 admin-state enable
set /interface ethernet-1/1 subinterface 0 admin-state enable
set /interface ethernet-1/1 subinterface 0 ipv6 admin-state enable
set /interface ethernet-1/1 subinterface 0 ipv6 address 2001:db8:1::1/64
set /network-instance default interface ethernet-1/1.0

set /interface ethernet-1/2 description "eBGP -> Provider2 AS65003"
set /interface ethernet-1/2 admin-state enable
set /interface ethernet-1/2 subinterface 0 admin-state enable
set /interface ethernet-1/2 subinterface 0 ipv6 admin-state enable
set /interface ethernet-1/2 subinterface 0 ipv6 address 2001:db8:2::1/64
set /network-instance default interface ethernet-1/2.0

set /interface ethernet-1/3 description "ISP LAN"
set /interface ethernet-1/3 admin-state enable
set /interface ethernet-1/3 subinterface 0 admin-state enable
set /interface ethernet-1/3 subinterface 0 ipv6 admin-state enable
set /interface ethernet-1/3 subinterface 0 ipv6 address 2001:db8:100::1/64
set /network-instance default interface ethernet-1/3.0

set /interface ethernet-1/4 description "Management Network"
set /interface ethernet-1/4 admin-state enable
set /interface ethernet-1/4 subinterface 0 admin-state enable
set /interface ethernet-1/4 subinterface 0 ipv6 admin-state enable
set /interface ethernet-1/4 subinterface 0 ipv6 address 2001:db8:200::1/64
set /network-instance default interface ethernet-1/4.0

set /interface system0 admin-state enable
set /interface system0 subinterface 0 admin-state enable
set /interface system0 subinterface 0 ipv6 admin-state enable
set /interface system0 subinterface 0 ipv6 address 2001:db8:6500::1/128
set /network-instance default interface system0.0

set /network-instance default protocols bgp admin-state enable
set /network-instance default protocols bgp autonomous-system 65000
set /network-instance default protocols bgp router-id 10.0.0.1
set /network-instance default protocols bgp afi-safi ipv6-unicast admin-state enable

set /network-instance default protocols bgp group backbone-prov1 admin-state enable
set /network-instance default protocols bgp group backbone-prov1 description "Primary Upstream"
set /network-instance default protocols bgp group backbone-prov1 afi-safi ipv6-unicast admin-state enable

set /network-instance default protocols bgp neighbor 2001:db8:1::2 admin-state enable
set /network-instance default protocols bgp neighbor 2001:db8:1::2 description "Provider1 AS65002"
set /network-instance default protocols bgp neighbor 2001:db8:1::2 peer-as 65002
set /network-instance default protocols bgp neighbor 2001:db8:1::2 peer-group backbone-prov1

set /routing-policy community-set ISP-CUSTOMERS member [65000:100]
set /routing-policy community-set ISP-INFRA member [65000:200]
set /routing-policy community-set GOOGLE-SERVICES member [65150:100]
set /routing-policy community-set CLOUDFLARE-SERVICES member [65160:100]

set /routing-policy community-set PROVIDER1-INFRA member [65002:200]

set /routing-policy prefix-set ISP-INFRA prefix 2001:db8:6500::1/128 mask-length-range exact
set /routing-policy prefix-set ISP-LAN prefix 2001:db8:100::/64 mask-length-range exact


set /routing-policy policy EXPORT-LOCAL default-action policy-result reject

set /routing-policy policy EXPORT-LOCAL statement 10 match protocol local
set /routing-policy policy EXPORT-LOCAL statement 10 match prefix-set ISP-INFRA
set /routing-policy policy EXPORT-LOCAL statement 10 action bgp communities add ISP-INFRA
set /routing-policy policy EXPORT-LOCAL statement 10 action policy-result accept

set /routing-policy policy EXPORT-LOCAL statement 20 match protocol local
set /routing-policy policy EXPORT-LOCAL statement 20 match prefix-set ISP-LAN
set /routing-policy policy EXPORT-LOCAL statement 20 action bgp communities add ISP-CUSTOMERS
set /routing-policy policy EXPORT-LOCAL statement 20 action policy-result accept

set /network-instance default protocols bgp group backbone-prov1 export-policy [ EXPORT-LOCAL ]

set /routing-policy policy IMPORT-PROVIDER1 default-action policy-result reject

set /routing-policy policy IMPORT-PROVIDER1 statement 10 match bgp community-set PROVIDER1-INFRA
set /routing-policy policy IMPORT-PROVIDER1 statement 10 action policy-result accept
set /routing-policy policy IMPORT-PROVIDER1 statement 20 match bgp community-set GOOGLE-SERVICES
set /routing-policy policy IMPORT-PROVIDER1 statement 20 action policy-result accept

set /routing-policy policy IMPORT-PROVIDER1 statement 30 match bgp community-set CLOUDFLARE-SERVICES
set /routing-policy policy IMPORT-PROVIDER1 statement 30 action policy-result accept


set /network-instance default protocols bgp group backbone-prov1 import-policy [ IMPORT-PROVIDER1 ]

set /network-instance default protocols linux import-routes true
set /network-instance default protocols linux export-routes true
set /network-instance default protocols linux export-neighbors true
