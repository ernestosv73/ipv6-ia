name: bgp-ia
mgmt:
  network: bgp-ia
  ipv4-subnet: 172.60.60.0/24

topology:
  nodes:

    rt-provider1:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:24.10.1
      type: ixr-d3
      startup-config: configs/prov1.cfg 

    rt-provider2:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:24.10.1
      type: ixr-d3
      #startup-config: configs/rt-prov2.cfg 

    rt-core:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:24.10.1
      type: ixr-d3
      startup-config: configs/core.cfg 

    rt-transit:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:24.10.1
      type: ixr-d3
      #startup-config: configs/rt-prov2.cfg 

    rt-google:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:24.10.1
      type: ixr-d3
      #startup-config: configs/rt-prov2.cfg   

    rt-cloudflare:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:24.10.1
      type: ixr-d3
      #startup-config: configs/rt-prov2.cfg 

    DNS-google:
      kind: linux
      image: docker.io/esanchezv/kaliipv6:latest  

    DNS-cloudflare:
      kind: linux
      image: docker.io/esanchezv/kaliipv6:latest  

    cliente-ISP:
      kind: linux
      image: docker.io/esanchezv/kaliipv6:latest  

    mgmt-ISP:
      kind: linux
      image: docker.io/esanchezv/kaliipv6:latest    

  links:
    - endpoints: ["rt-provider1:e1-1", "rt-core:e1-1"]
    - endpoints: ["rt-provider2:e1-1", "rt-core:e1-2"]
    - endpoints: ["rt-provider1:e1-2", "rt-transit:e1-1"]
    - endpoints: ["rt-provider2:e1-2", "rt-transit:e1-2"]
    - endpoints: ["rt-transit:e1-3", "rt-google:e1-1"]
    - endpoints: ["rt-transit:e1-4", "rt-cloudflare:e1-1"]
    - endpoints: ["rt-google:e1-2", "DNS-google:eth1"]
    - endpoints: ["rt-cloudflare:e1-2", "DNS-cloudflare:eth1"]
    - endpoints: ["cliente-ISP:eth1", "rt-core:e1-3"]
    - endpoints: ["mgmt-ISP:eth1", "rt-core:e1-4"]
    

